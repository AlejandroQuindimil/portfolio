<div id="other-projects" class="other-projects-section">
  <h2><span class="number">04. </span> Other Projects</h2>

  <div class="carousel-outer">
    <!-- Flecha izquierda (fuera del área de la tarjeta) -->
    <button
      class="carousel-arrow carousel-arrow--left"
      type="button"
      aria-label="Proyecto anterior"
      (click)="prev()"
    >
      <i class="fa fa-chevron-left"></i>
    </button>

    <div
      class="carousel-viewport"
      (mouseenter)="onMouseEnter()"
      (mouseleave)="onMouseLeave()"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp($event)"
      (pointercancel)="onPointerUp($event)"
    >
      <div class="carousel-wrapper">
        <div
          class="carousel-container"
          [class.no-transition]="!transitionEnabled"
          [style.transform]="trackTransform"
          (transitionend)="onTrackTransitionEnd()"
        >
          <div
            class="carousel-item"
            [class.is-active]="i === trackIndex"
            *ngFor="let project of extendedProjects; let i = index"
          >
            <div class="project-card2" (click)="!dragHandled && openProject(project.link)">
              <div class="project-header">
                <i class='far fa-folder-open' style='font-size:36px'></i>
                <h3>{{ project.title }}</h3>
              </div>
              <p class="project-description-text">{{ project.description }}</p>

              <div class="project-tags">
                <span class="badge" *ngFor="let tag of project.tags">{{ tag }}</span>
              </div>
              <div class="project-icons">
                <a
                  *ngIf="project.link"
                  [href]="project.link"
                  class="icon-link"
                  target="_blank"
                  (click)="$event.stopPropagation()"
                >
                  <i class="fa fa-link"></i>
                </a>
                <a
                  *ngIf="project.github"
                  [href]="project.github"
                  class="icon-link"
                  target="_blank"
                  (click)="$event.stopPropagation()"
                >
                  <i class="fab fa-github"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Flecha derecha (fuera del área de la tarjeta) -->
    <button
      class="carousel-arrow carousel-arrow--right"
      type="button"
      aria-label="Siguiente proyecto"
      (click)="next()"
    >
      <i class="fa fa-chevron-right"></i>
    </button>
  </div>

  <!-- Indicadores (puntos): funcionan como un mini slider — se puede
       deslizar (arrastrar) sobre ellos para cambiar de proyecto en vivo,
       además del click directo en cada punto -->
  <div
    class="carousel-dots"
    (pointerdown)="onDotsPointerDown($event)"
    (pointermove)="onDotsPointerMove($event)"
    (pointerup)="onDotsPointerUp($event)"
    (pointercancel)="onDotsPointerUp($event)"
  >
    <button
      *ngFor="let project of projects; let i = index"
      class="carousel-dot"
      [class.active]="i === currentIndex"
      type="button"
      [attr.aria-label]="'Ir al proyecto ' + (i + 1)"
      (click)="goTo(i)"
    ></button>
  </div>
</div>
